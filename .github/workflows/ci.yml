name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace

      # Verify the tarball name built by cmd_update matches what release.yml produces.
      # Catches any future drift between the two files before it ships.
      - name: Check release/update filename consistency
        run: |
          # Extract the tarball pattern from cmd_update in main.rs
          UPDATE_PATTERN=$(grep 'let tarball = format!' crates/chamgei-core/src/main.rs | \
            sed 's/.*format!("\(.*\)".*/\1/')
          echo "update pattern: $UPDATE_PATTERN"

          # It must NOT contain a leading 'v' before the version placeholder
          if echo "$UPDATE_PATTERN" | grep -qE 'chamgei-v\{'; then
            echo "ERROR: tarball name in cmd_update has a spurious 'v' prefix before the version"
            exit 1
          fi

          # The arch mapping must use the same names as matrix.arch in release.yml
          # release.yml uses: aarch64, x86_64
          # cmd_update must not remap aarch64 -> arm64
          if grep -A2 '"aarch64"' crates/chamgei-core/src/main.rs | grep -q '"arm64"'; then
            echo "ERROR: cmd_update maps aarch64 -> arm64 but release.yml uses aarch64"
            exit 1
          fi

          echo "OK: tarball name is consistent between release.yml and cmd_update"
